name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Permisos necesarios para que el robot publique resultados
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # Esto ejecuta la compilación y las 26 pruebas que ya tienes listas
        run: mvn clean verify

      - name: Upload artifacts
        # Actualizado a v4 para corregir el error de la imagen 1
        uses: actions/upload-artifact@v4
        with:
          name: gestion-gastos-jar
          path: target/*.jar

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
