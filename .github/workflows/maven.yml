name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # Combinamos para ser más eficientes
        run: mvn clean verify

      - name: Upload artifacts
        # Solo se ejecuta si el build anterior fue exitoso
        uses: actions/upload-artifact@v4
        with:
          name: gestion-gastos-jar
          path: target/*.jar

      - name: Publish test results
        if: always() # Importante: queremos ver los resultados aunque algo falle
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
